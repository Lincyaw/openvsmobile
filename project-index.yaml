  - id: REQ-012
    title: Diff viewer
    description: >
      Side-by-side or unified diff view for changed files.
      Syntax-highlighted diff with add/remove coloring.
      Accessible from git status view and from AI chat file-change cards.
    priority: P1
    status: implemented
    code:
      - app/lib/screens/diff_screen.dart
    tests: []
    depends_on: [REQ-011, REQ-007]

  - id: REQ-013
    title: LSP diagnostics integration
    description: >
      Run language-specific diagnostic commands (go vet, dart analyze, eslint,
      pylint) via the Go server, parse output into structured diagnostics,
      and display inline in the code viewer with gutter icons and severity
      coloring. Pragmatic approach using CLI tools instead of full LSP proxy.
    priority: P1
    status: implemented
    code:
      - server/internal/diagnostics/diagnostics.go
      - server/internal/api/diagnostics.go
      - app/lib/models/diagnostic.dart
      - app/lib/widgets/code_viewer.dart
      - app/lib/providers/editor_provider.dart
      - app/lib/services/api_client.dart
    tests:
      - server/internal/diagnostics/diagnostics_test.go
    depends_on: [REQ-001, REQ-003, REQ-007]

  - id: REQ-014
    title: Bridge terminal session backend
    description: >
      Go server exposes bridge terminal endpoints around a unified session
      model instead of the legacy /ws/terminal byte stream. REST endpoints:
      GET /bridge/terminal/sessions plus POST /bridge/terminal/create,
      /attach, /resize, /rename, /close, and /split. WebSocket endpoint:
      /bridge/ws/terminal/:id for attach/re-attach streaming with ready,
      output, error, and exit messages. Session lifecycle updates are also
      rebroadcast on /bridge/ws/events so the mobile client can refresh
      terminal state without a dedicated VS Code terminal adapter.
    priority: P1
    status: implemented
    code:
      - server/internal/terminal/terminal.go
      - server/internal/api/terminal.go
      - server/internal/api/router.go
      - server/internal/api/bridge.go
      - server/cmd/server/main.go
    tests:
      - server/internal/terminal/terminal_test.go
      - server/internal/api/handler_test.go
    depends_on: [REQ-003, REQ-025]

  # ============================================================
  # Iteration 3: Nice-to-have
  # ============================================================

  - id: REQ-015
    title: OpenVSCode Server upstream sync tooling
    description: >
      Shell script to fetch upstream changes from
