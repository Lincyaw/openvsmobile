    tests: []
    depends_on: []

  - id: REQ-016
    title: AI chat history browser
    description: >
      Browse all past Claude sessions with search and filtering.
      Timeline view with date section headers, project grouping tab.
      Server-side search via query params. Tap a session to see full
      conversation with navigable references.
    priority: P2
    status: implemented
    code:
      - server/internal/claude/session.go
      - server/internal/api/sessions.go
      - app/lib/screens/session_list_screen.dart
      - app/lib/providers/chat_provider.dart
      - app/lib/services/chat_api_client.dart
    tests:
      - server/internal/claude/session_test.go
    depends_on: [REQ-005, REQ-010]

  # ============================================================
  # Iteration 4: UI/UX improvements (from user-perspective audit)
  # ============================================================

  - id: REQ-017
    title: Settings screen with runtime server configuration
    description: >
      Replace the compile-time-only SERVER_URL/AUTH_TOKEN with a Settings
      screen that persists server URL and auth token via SharedPreferences.
      App reads saved values on startup, falls back to compile-time defaults.
      Settings UI: server URL field, auth token field, save button, test
      connection button. Accessible from More tab.
    priority: P0
    status: implemented
    code:
      - app/lib/screens/settings_screen.dart
      - app/lib/services/settings_service.dart
      - app/lib/main.dart
    tests: []
    depends_on: [REQ-003]

  - id: REQ-018
    title: File operations (create, delete, mkdir) via context menu
    description: >
      Long-press on file/folder in FileTreeView shows a context menu with
      actions: New File, New Folder, Delete, Copy Path. Uses existing
      server APIs (PUT /api/files/ for create, DELETE /api/files/ for delete).
      Add FAB or AppBar action on Files screen for "New File" / "New Folder"
      at root level. Confirmation dialog before delete.
    priority: P1
    status: implemented
    code:
      - app/lib/widgets/file_tree_view.dart
      - app/lib/screens/files_screen.dart
      - app/lib/providers/file_provider.dart
    tests: []
    depends_on: [REQ-002, REQ-006]

  - id: REQ-019
    title: Session list with conversation summary
    description: >
      Show the first user message as a summary/preview in each session
      tile on the session list screen. Server adds a 'summary' field
      (first user text, truncated to 120 chars) to GET /api/sessions
      response. Flutter SessionMeta model and _SessionTile updated to
      display it.
    priority: P2
    status: implemented
    code:
      - server/internal/claude/session.go
      - server/internal/api/sessions.go
      - app/lib/models/session.dart
      - app/lib/screens/session_list_screen.dart
    tests:
      - server/internal/claude/session_test.go
    depends_on: [REQ-005, REQ-016]

  - id: REQ-020
    title: Terminal ANSI color rendering and adaptive sizing
    description: >
      Replace plain SelectableText terminal output with ANSI-aware
      rendering that converts SGR escape codes to colored TextSpans.
      Calculate terminal cols/rows from screen width and font metrics,
      send resize messages via WebSocket. Support basic 8/16/256 colors
      and bold/italic/underline attributes.
    priority: P2
    status: implemented
    code:
      - app/lib/screens/terminal_screen.dart
      - app/lib/widgets/ansi_text.dart
    tests: []
    depends_on: [REQ-014]

  - id: REQ-021
    title: Content search (grep) across files
    description: >
      Add server endpoint GET /api/search?q=<pattern>&path=<dir> that
      runs grep/ripgrep on the server and returns matching file paths
      with line numbers and context. Flutter SearchScreen gets a toggle
      between "File name" and "File content" search modes. Content
      results show file path, line number, and matching line preview.
      Search is scoped to current workspace via WorkspaceProvider.
      Tap navigates to code viewer at the matched line.
    priority: P1
    status: implemented
    code:
      - server/internal/api/search.go
      - server/internal/api/router.go
      - app/lib/screens/search_screen.dart
      - app/lib/providers/search_provider.dart
      - app/lib/services/api_client.dart
    tests: []
    depends_on: [REQ-003]

  - id: REQ-022
    title: Git stage, unstage, and commit operations
    description: >
      Add server methods and API endpoints for git add (stage), git
      reset HEAD (unstage), and git commit. Endpoints:
      POST /api/git/stage?path=<dir>&file=<file>,
      POST /api/git/unstage?path=<dir>&file=<file>,
      POST /api/git/commit?path=<dir> with JSON body {message: string}.
      Flutter GitScreen changes view: add stage/unstage toggle buttons
      per file, commit button with message input dialog.
    priority: P1
    status: implemented
    code:
      - server/internal/git/git.go
      - server/internal/api/git.go
      - server/internal/api/router.go
      - app/lib/screens/git_screen.dart
      - app/lib/providers/git_provider.dart
      - app/lib/services/git_api_client.dart
    tests:
      - server/internal/git/git_test.go
    depends_on: [REQ-011]

  - id: REQ-023
    title: Mobile runtime bridge lifecycle manager
    description: >
      Go server tracks a built-in mobile runtime bridge discovery contract,
      monitors ready/not-ready state, detects generation changes as bridge
      restarts, and resets state cleanly when the VS Code transport drops or
      the server shuts down. The bridge manager owns the discovery file poll
      loop and lifecycle event broadcast foundation without any fallback path.
    priority: P0
    status: implemented
    code:
      - server/internal/vscode/bridge.go
      - server/internal/vscode/client.go
      - server/cmd/server/main.go
      - openvscode-server/extensions/mobile-runtime-bridge/src/extension.ts
    tests:
      - server/internal/vscode/bridge_test.go
      - server/internal/vscode/bridge_integration_test.go
    depends_on: [REQ-001]

  - id: REQ-024
    title: Bridge capabilities discovery API
    description: >
      Go server exposes GET /bridge/capabilities with an RFC-shaped capability
      document once the runtime bridge is ready. Before readiness, the endpoint
      fails explicitly with structured bridge_not_ready / capability_unavailable
      errors rather than silently falling back to legacy APIs.
    priority: P0
    status: implemented
    code:
      - server/internal/api/bridge.go
      - server/internal/api/router.go
      - server/internal/vscode/bridge.go
      - server/cmd/server/main.go
      - openvscode-server/extensions/mobile-runtime-bridge/src/extension.ts
    tests:
      - server/internal/api/bridge_test.go
      - server/internal/vscode/bridge_test.go
    depends_on: [REQ-023]

  - id: REQ-025
    title: Bridge lifecycle event stream
    description: >
      Go server exposes WS /bridge/ws/events with a stable {type, payload}
      envelope and emits bridge/ready plus bridge/restarted lifecycle events.
      The built-in extension publishes generation-tagged discovery metadata so
      the server can rebroadcast restart -> ready transitions to clients.
    priority: P0
    status: implemented
    code:
      - server/internal/api/bridge.go
      - server/internal/api/router.go
      - server/internal/vscode/bridge.go
      - openvscode-server/extensions/mobile-runtime-bridge/package.json
      - openvscode-server/extensions/mobile-runtime-bridge/tsconfig.json
      - openvscode-server/extensions/mobile-runtime-bridge/extension.webpack.config.js
      - openvscode-server/extensions/mobile-runtime-bridge/src/extension.ts
      - openvscode-server/build/gulpfile.extensions.ts
      - openvscode-server/build/npm/dirs.ts
    tests:
      - server/internal/api/bridge_test.go
      - server/internal/vscode/bridge_test.go
      - server/internal/vscode/bridge_integration_test.go
    depends_on: [REQ-023, REQ-024]

  - id: REQ-026
    title: Bridge document sync protocol
    description: >
      Ticket ASE-42 / GitHub issue #3 adds a VS Code TextDocument-shaped
      document sync contract for the mobile runtime bridge. The Go server
      exposes POST /bridge/doc/open, /bridge/doc/change, /bridge/doc/save,
      and /bridge/doc/close; tracks per-file in-memory buffers with monotonic
      versions; validates range/position edits with VS Code-compatible
      character semantics; returns structured document_not_open,
      version_conflict, and invalid_position errors; and keeps the latest
      unsaved buffer available to future workspace edit, diagnostics, and
      completion features without falling back to legacy git/terminal paths.
    priority: P0
    status: implemented
    code:
      - server/internal/vscode/bridge.go
      - server/internal/api/bridge.go
      - server/internal/api/router.go
      - server/cmd/server/main.go
    tests:
      - server/internal/vscode/document_sync_test.go
      - server/internal/api/bridge_documents_test.go
    depends_on: [REQ-003, REQ-023]

  # ============================================================
  # Iteration 5: Bug fixes from code review audit
  # ============================================================

  - id: REQ-023
    title: GitHub App device-flow auth foundation
    description: >
      Go server provides host-aware GitHub App device-flow authentication
      endpoints for start, poll, status, and disconnect. Authorized polls
      persist the current account session with access and refresh token expiry
      metadata using an atomic JSON store. GitHub API calls that require a
      user token go through refresh preflight so expired or revoked refresh
      tokens surface a structured reauthorization error instead of leaking
      partial state.
    priority: P1
    status: implemented
    code:
      - server/internal/github/client.go
      - server/internal/github/types.go
      - server/internal/github/store.go
      - server/internal/github/service.go
      - server/internal/api/router.go
      - server/internal/api/github_auth.go
      - server/cmd/server/main.go
    tests:
      - server/internal/github/service_test.go
      - server/internal/github/store_test.go
      - server/internal/api/github_auth_test.go
    depends_on: [REQ-003]

  - id: FIX-001
    title: Search API path sanitization
    description: >
      handleSearch in search.go uses the path parameter directly without
      calling sanitizePath(), unlike all other API handlers. This allows
      directory traversal attacks. Add sanitizePath() call consistent
      with git and files handlers.
    priority: P0
    status: implemented
    code:
      - server/internal/api/search.go
    tests: []
    depends_on: [REQ-021]

  - id: FIX-002
    title: Search input debounce
    description: >
      SearchScreen fires a search on every keystroke (onChanged) with no
      debounce. File name search triggers recursive API calls per directory,
      content search triggers a full server-side file walk. Add a 300ms
      debounce timer to both search modes.
    priority: P1
    status: implemented
    code:
      - app/lib/screens/search_screen.dart
    tests: []
    depends_on: [REQ-021]

  - id: FIX-003
    title: Terminal output buffer unbounded growth
    description: >
      Terminal _outputBuffer (StringBuffer) grows without limit. Long
      sessions cause memory exhaustion. Cap the buffer at ~100KB,
      trimming old content when exceeded. Also preserve ANSI state
      across WebSocket message chunks by storing _SgrState and remainder.
    priority: P1
    status: implemented
    code:
      - app/lib/screens/terminal_screen.dart
      - app/lib/widgets/ansi_text.dart
    tests: []
    depends_on: [REQ-020]

  - id: FIX-004
    title: File name validation in create dialog
    description: >
      File/folder creation dialog accepts any input including '/',
      '..', and special characters. Add client-side validation to
      reject names containing path separators or traversal patterns.
    priority: P1
    status: implemented
    code:
      - app/lib/widgets/file_tree_view.dart
    tests: []
    depends_on: [REQ-018]

  - id: FIX-005
    title: Session tile layout with summary
    description: >
      _SessionTile subtitle changed from Row to Column but does not set
      isThreeLine:true on ListTile, causing potential clipping of the
      summary text. Add isThreeLine when summary is present.
    priority: P2
    status: implemented
    code:
      - app/lib/screens/session_list_screen.dart
    tests: []
    depends_on: [REQ-019]

  - id: FIX-006
    title: AI chat stream-json protocol mismatch
    description: >
      Three bugs prevented AI chat from working:
      1) Go server missing --verbose flag (required for stream-json output).
      2) Wrong input format: was {"type":"user","content":"..."}, must be
         {"type":"user","message":{"role":"user","content":"..."}}.
      3) Flutter client read content at wrong JSON path: assistant content
         is at msg.message.content (not msg.content), result text is at
         msg.result (not msg.content).
    priority: P0
    status: implemented
    code:
      - server/internal/claude/process.go
      - server/internal/claude/types.go
      - app/lib/providers/chat_provider.dart
    tests: []
    depends_on: [REQ-004]

  - id: FIX-007
    title: Terminal excessive newlines from CRLF and standalone CR
    description: >
      Terminal output showed many blank lines because raw PTY output uses
      CRLF (\r\n) and standalone CR for cursor movement. The StringBuffer
      didn't collapse these. Replaced with a line-based buffer that handles
      CRLF as single newline and standalone CR as line overwrite.
    priority: P1
    status: implemented
    code:
      - app/lib/screens/terminal_screen.dart
